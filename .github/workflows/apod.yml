name: Run APOD daily

on:
  schedule:
    - cron: '0 9 * * *' # 06:00 Brasil (UTC-3)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run app
        run: dotnet run --project src/NomeDoProjeto
        env:
          NASA_TOKEN: ${{ secrets.NASA_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID_TOKEN: ${{ secrets.CHAT_ID_TOKEN }}
